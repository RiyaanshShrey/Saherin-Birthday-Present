<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stage">
        <div class="door left-door"></div>
        <div class="door right-door"></div>

        <div class="card">
            <h1>🎂 Happy Birthday 🎂</h1>
            <h2 id="name">Dear Saherin</h2>
            <p class="message">
                May your day be filled with warmth, smiles, and beautiful memories.
                May the coming year bring peace, strength, and quiet happiness.
            </p>

            <p id="surprise">
                🎁 Your birthday present is here: endless love, joy, and warm wishes.
                You are cherished more than words can ever explain 🌸
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
